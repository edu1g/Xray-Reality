name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sync with upstream
        run: |
          gh repo sync $GITHUB_REPOSITORY -b main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
